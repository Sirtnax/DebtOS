<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07070f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DebtOS">
<meta name="description" content="ระบบติดตามหนี้ส่วนตัว — DebtOS">
<title>DebtOS — ระบบติดตามหนี้</title>
<link rel="manifest" href="manifest.json">
<!-- Apple touch icons -->
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070f;--surface:#0b0b17;--card:#111120;--border:#1c1c2e;--dim:#2a2a42;
  --muted:#5a5a7a;--sub:#9090b0;--text:#ddddf0;
  --red:#ff3d5a;--green:#00e5a0;--yellow:#ffc840;--orange:#ff7040;--blue:#4080ff;--purple:#a060ff;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:'Noto Sans Thai','Syne',sans-serif;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
.mono{font-family:'JetBrains Mono',monospace}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.topbar{
  background:rgba(7,7,15,.96);border-bottom:1px solid var(--border);
  padding:calc(var(--safe-top) + 10px) 16px 10px;
  display:flex;align-items:center;gap:10px;flex-shrink:0;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  position:sticky;top:0;z-index:30
}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;letter-spacing:3px;color:var(--text)}
.logo em{color:var(--red);font-style:normal}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--safe-bot) + 70px)}
.bottomnav{
  background:rgba(7,7,15,.97);border-top:1px solid var(--border);
  padding:8px 4px calc(var(--safe-bot) + 6px);
  display:flex;justify-content:space-around;flex-shrink:0;
  position:sticky;bottom:0;z-index:30;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)
}
.navbtn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;color:var(--muted);cursor:pointer;
  padding:5px 10px;border-radius:10px;transition:all .15s;min-width:52px
}
.navbtn .nb-icon{font-size:1.15rem;line-height:1}
.navbtn .nb-label{font-size:0.6rem;font-family:'Noto Sans Thai',sans-serif;white-space:nowrap}
.navbtn.on{color:var(--red);background:rgba(255,61,90,.1)}
.navbtn:active{transform:scale(.93)}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px;border-top:2px solid}
.scard-label{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.scard-val{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:700}
.stitle{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:400px){.g3{grid-template-columns:1fr 1fr}}

/* ── PROGRESS ── */
.pbar-wrap{display:flex;align-items:center;gap:6px}
.pbar{flex:1;height:5px;background:var(--bg);border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .5s}

/* ── HERO ── */
.hero-amt{font-family:'JetBrains Mono',monospace;font-size:clamp(2rem,8vw,3.2rem);font-weight:700;color:var(--red);line-height:1}

/* ── BADGE ── */
.badge{display:inline-block;font-size:.65rem;padding:2px 7px;border-radius:4px}
.b-red{background:rgba(255,61,90,.15);color:var(--red);border:1px solid rgba(255,61,90,.3)}
.b-grn{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.25)}
.b-yel{background:rgba(255,200,64,.1);color:var(--yellow);border:1px solid rgba(255,200,64,.25)}
.b-blu{background:rgba(64,128,255,.1);color:var(--blue);border:1px solid rgba(64,128,255,.25)}

/* ── BUTTONS ── */
.btn{font-family:'Noto Sans Thai',sans-serif;font-size:.78rem;padding:7px 15px;border-radius:8px;cursor:pointer;border:1px solid var(--border);transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.96)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-ghost{background:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--surface);color:var(--text)}
.btn-grn{background:transparent;color:var(--green);border-color:var(--green)}
input[type=text],input[type=number],select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Noto Sans Thai',sans-serif;font-size:.85rem;padding:9px 12px;border-radius:8px;outline:none;width:100%}
input:focus,select:focus{border-color:var(--red)}
input[type=range]{width:100%;accent-color:var(--red)}

/* ── TABLE ── */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tbl-wrap table{width:100%;border-collapse:collapse;min-width:600px}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
th{padding:9px 12px;text-align:left;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);background:var(--surface);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
th:active{color:var(--text)}
td{padding:11px 12px;font-size:.82rem;border-bottom:1px solid rgba(28,28,46,.5);vertical-align:middle}
tr:last-child td{border-bottom:none}
tfoot td{background:var(--surface);border-top:1px solid var(--border);font-weight:700;font-family:'JetBrains Mono',monospace}

/* ── MODAL (slide up) ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.overlay.on{display:flex}
.sheet{background:var(--card);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 20px calc(var(--safe-bot)+20px);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.sheet-handle{width:36px;height:4px;background:var(--dim);border-radius:99px;margin:0 auto 18px}
.sheet-title{font-weight:700;font-size:.95rem;margin-bottom:18px}
.frow{margin-bottom:13px}
.flabel{display:block;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--safe-bot)+80px);left:50%;transform:translateX(-50%) translateY(20px);z-index:400;background:var(--card);border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:99px;font-size:.82rem;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}

/* ── PAY ITEMS ── */
.payitem{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.payday{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:700;min-width:34px;text-align:center;line-height:1}

/* ── ACHIEVEMENT ── */
.ach{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.ach.unlocked{border-color:var(--yellow)}
.ach.locked{opacity:.35}
.ach-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;background:var(--surface)}
.ach.unlocked .ach-icon{background:rgba(255,200,64,.15)}

/* ── AI ── */
.ai-msg{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;font-size:.82rem;line-height:1.7;color:#c0c0e0}
.ai-label{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}

/* ── NW BAR ── */
.nw-bar{display:flex;height:26px;border-radius:8px;overflow:hidden;margin-bottom:8px}
.nw-seg{display:flex;align-items:center;justify-content:center;font-size:.6rem;font-family:'JetBrains Mono',monospace;transition:flex .5s}

/* ── STREAK ── */
.streak-grid{display:flex;gap:3px;flex-wrap:wrap}
.sdot{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-family:'JetBrains Mono',monospace}

/* ── PULL REFRESH indicator ── */
.ptr{text-align:center;padding:10px;font-size:.72rem;color:var(--muted);height:0;overflow:hidden;transition:height .2s}
.ptr.show{height:40px}

/* ── INSTALL BANNER ── */
.install-banner{background:linear-gradient(135deg,rgba(255,61,90,.15),rgba(160,96,255,.15));border:1px solid rgba(255,61,90,.3);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:none;align-items:center;gap:12px}
.install-banner.show{display:flex}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">DEBT<em>OS</em></div>
    <div style="flex:1"></div>
    <div id="dateStr" class="mono" style="font-size:.65rem;color:var(--muted)"></div>
    <button id="installBtn" class="btn btn-ghost" style="padding:4px 10px;font-size:.7rem;display:none" onclick="doInstall()">📲 ติดตั้ง</button>
  </div>

  <div class="main" id="main">
    <div id="installBanner" class="install-banner">
      <div style="font-size:1.4rem">📲</div>
      <div style="flex:1">
        <div style="font-size:.85rem;font-weight:600">ติดตั้งเป็นแอพ!</div>
        <div style="font-size:.72rem;color:var(--muted)">เพิ่มลง Home Screen เพื่อใช้งานแบบ offline</div>
      </div>
      <button class="btn btn-red" style="padding:6px 12px;font-size:.72rem" onclick="doInstall()">ติดตั้ง</button>
      <button onclick="dismissInstall()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:4px">✕</button>
    </div>
    <div id="content"></div>
  </div>

  <nav class="bottomnav" id="bottomnav"></nav>
</div>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'debtos_v3';
const PALETTE = ['#ff3d5a','#00e5a0','#ffc840','#ff7040','#4080ff','#a060ff','#ff80b0','#40d0ff'];
const TABS = [
  {id:'overview', icon:'📊', label:'ภาพรวม'},
  {id:'debts',    icon:'💳', label:'หนี้'},
  {id:'schedule', icon:'📅', label:'นัดชำระ'},
  {id:'calc',     icon:'📈', label:'คำนวณ'},
  {id:'strategy', icon:'🏆', label:'กลยุทธ์'},
  {id:'achieve',  icon:'🎖', label:'รางวัล'},
  {id:'ai',       icon:'🤖', label:'AI'},
];

const INIT_DEBTS = [
  {id:1,name:'Finnix',rate:0.33,cutoff:'',due:'20',full:15768,debt:13600,note:'',history:[]},
  {id:2,name:'Rabbit Cash',rate:0.33,cutoff:'30',due:'15',full:25300,debt:25500,note:'ยอดขั้น 1st',history:[]},
  {id:3,name:'Promise',rate:0.25,cutoff:'',due:'31',full:10000,debt:9700,note:'',history:[]},
  {id:4,name:'KTC Proud',rate:0.25,cutoff:'20',due:'5',full:34500,debt:35222,note:'',history:[]},
  {id:5,name:'Umay',rate:0.198,cutoff:'',due:'2',full:72000,debt:72848,note:'',history:[]},
  {id:6,name:'UOB Credit',rate:0.16,cutoff:'20',due:'13',full:96000,debt:83068,note:'',history:[]},
  {id:7,name:'Samsung Finance',rate:0,cutoff:'',due:'1',full:16228,debt:4056,note:'',history:[]},
  {id:8,name:'Shopee',rate:0,cutoff:'',due:'',full:0,debt:1030,note:'',history:[]},
  {id:9,name:'Thunder',rate:0.33,cutoff:'',due:'',full:40000,debt:38500,note:'',history:[]},
];
const INIT_ASSETS = [
  {id:1,name:'เงินสด/ออมทรัพย์',value:15000},
  {id:2,name:'รถยนต์',value:150000},
];

// ── STATE ─────────────────────────────────────────────────────────────────
function loadState(){
  try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}
  return{debts:JSON.parse(JSON.stringify(INIT_DEBTS)),assets:JSON.parse(JSON.stringify(INIT_ASSETS)),
    nextId:10,nextAid:3,tab:'overview',loginStreak:1,lastLogin:null,totalPaid:0,achievements:{}};
}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(S));}catch(e){}}

let S=loadState();

// streak
const today2=new Date().toDateString();
if(S.lastLogin!==today2){
  if(S.lastLogin===new Date(Date.now()-86400000).toDateString()) S.loginStreak=(S.loginStreak||0)+1;
  else S.loginStreak=1;
  S.lastLogin=today2;save();
}

// ── HELPERS ───────────────────────────────────────────────────────────────
const fmt=n=>(n||0).toLocaleString('th-TH');
const fmtB=n=>'฿'+fmt(Math.round(n));
const pct=(d,f)=>f>0?Math.round(d/f*100):0;
const mInt=(d,r)=>Math.round(d*r/12);
const moOff=(d,r,m)=>{if(m<=0)return 999;const ri=r/12;if(ri===0)return Math.ceil(d/m);if(m<=d*ri)return 999;return Math.ceil(Math.log(m/(m-d*ri))/Math.log(1+ri));};
const totDebt=()=>S.debts.reduce((a,d)=>a+d.debt,0);
const totFull=()=>S.debts.reduce((a,d)=>a+d.full,0);
const totInt=()=>S.debts.reduce((a,d)=>a+mInt(d.debt,d.rate),0);
const netWorth=()=>S.assets.reduce((a,x)=>a+x.value,0)-totDebt();
const dfDate=(mo)=>{if(mo>=999)return'–';const d=new Date();d.setMonth(d.getMonth()+mo);return d.toLocaleDateString('th-TH',{month:'short',year:'numeric'});};

// ── ACHIEVEMENTS ──────────────────────────────────────────────────────────
const ACHIEVEMENTS=[
  {id:'first_pay',icon:'🏆',name:'ก้าวแรก',desc:'บันทึกการชำระครั้งแรก',check:()=>S.totalPaid>0},
  {id:'paid_10k',icon:'💰',name:'โปะ 10K',desc:'ชำระสะสมเกิน ฿10,000',check:()=>S.totalPaid>=10000},
  {id:'paid_100k',icon:'💎',name:'นักชำระหนี้',desc:'ชำระสะสมเกิน ฿100,000',check:()=>S.totalPaid>=100000},
  {id:'streak3',icon:'🔥',name:'3 วันติดต่อ',desc:'เข้าใช้งาน 3 วันติดต่อกัน',check:()=>(S.loginStreak||0)>=3},
  {id:'streak7',icon:'⚡',name:'7 วันติดต่อ',desc:'เข้าใช้งาน 7 วันติดต่อกัน',check:()=>(S.loginStreak||0)>=7},
  {id:'no_over',icon:'✅',name:'ไม่เกิน Limit',desc:'ไม่มีบัญชีเกิน 100%',check:()=>S.debts.filter(d=>d.full>0&&pct(d.debt,d.full)>100).length===0},
  {id:'debt_free_one',icon:'🎉',name:'ปลดหนี้แรก',desc:'หนี้หมดแล้ว 1 บัญชี',check:()=>S.debts.some(d=>d.debt===0&&d.full>0)},
  {id:'under_half',icon:'📉',name:'ครึ่งทาง',desc:'หนี้ต่ำกว่า 50% วงเงิน',check:()=>pct(totDebt(),totFull())<50},
];

// ── TOAST ─────────────────────────────────────────────────────────────────
let _tt;
function toast(msg,c='var(--green)'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.borderColor=c;t.style.color=c;
  t.classList.add('on');clearTimeout(_tt);
  _tt=setTimeout(()=>t.classList.remove('on'),2500);
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openSheet(html){
  document.getElementById('sheet').innerHTML='<div class="sheet-handle"></div>'+html;
  document.getElementById('overlay').classList.add('on');
}
function closeSheet(){document.getElementById('overlay').classList.remove('on');}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeSheet();});

// ── PWA INSTALL ───────────────────────────────────────────────────────────
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('installBtn').style.display='block';
  document.getElementById('installBanner').classList.add('show');
});
function doInstall(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(r=>{
    if(r.outcome==='accepted')toast('✓ ติดตั้งแล้ว! เช็ค Home Screen ของคุณ');
    deferredPrompt=null;
    document.getElementById('installBtn').style.display='none';
    document.getElementById('installBanner').classList.remove('show');
  });
}
function dismissInstall(){document.getElementById('installBanner').classList.remove('show');}
window.addEventListener('appinstalled',()=>toast('🎉 DebtOS ถูกติดตั้งแล้ว!'));

// ── NAV ───────────────────────────────────────────────────────────────────
function renderNav(){
  document.getElementById('bottomnav').innerHTML=TABS.map(t=>
    `<button class="navbtn${S.tab===t.id?' on':''}" onclick="goTab('${t.id}')">
       <span class="nb-icon">${t.icon}</span>
       <span class="nb-label">${t.label}</span>
     </button>`
  ).join('');
  document.getElementById('dateStr').textContent=new Date().toLocaleDateString('th-TH',{day:'2-digit',month:'short'});
}

function goTab(id){S.tab=id;save();render();}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  renderNav();
  const m=document.getElementById('main');
  m.scrollTop=0;
  const banner=document.getElementById('installBanner').outerHTML;
  let html='';
  if(S.tab==='overview') html=tabOverview();
  else if(S.tab==='debts') html=tabDebts();
  else if(S.tab==='schedule') html=tabSchedule();
  else if(S.tab==='calc') html=tabCalc();
  else if(S.tab==='strategy') html=tabStrategy();
  else if(S.tab==='achieve') html=tabAchieve();
  else if(S.tab==='ai') html=tabAI();
  document.getElementById('content').innerHTML=html;
}

// ════════════ TABS ══════════════════════════════════════════════════════════

// ── TAB: OVERVIEW ────────────────────────────────────────────────────────
function tabOverview(){
  const td=totDebt(),tf=totFull(),ti=totInt();
  const nw=netWorth();
  const ta=S.assets.reduce((a,x)=>a+x.value,0);
  const maxD=Math.max(...S.debts.map(d=>d.debt),1);
  const minMo=Math.round(ti*1.5);
  const mos=moOff(td,ti*12/(td||1),minMo);

  return`
  <div style="margin-bottom:16px">
    <div style="font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:5px">ยอดหนี้คงเหลือรวม</div>
    <div class="hero-amt">${fmtB(td)}</div>
    <div style="font-size:.78rem;color:var(--muted);margin-top:4px">
      วงเงินรวม <span style="color:var(--yellow)">${fmtB(tf)}</span> · ชำระสะสม <span style="color:var(--green)">${fmtB(S.totalPaid)}</span>
    </div>
  </div>

  <div class="g3" style="margin-bottom:12px">
    ${[
      {l:`${S.debts.length} บัญชี`,sl:'หนี้ทั้งหมด',c:'var(--blue)'},
      {l:fmtB(ti),sl:'ดอกเบี้ย/เดือน',c:'var(--orange)'},
      {l:(nw>=0?'+':'')+fmtB(nw),sl:'Net Worth',c:nw>=0?'var(--green)':'var(--red)'},
    ].map(s=>`<div class="scard" style="border-top-color:${s.c}"><div class="scard-label">${s.sl}</div><div class="scard-val" style="color:${s.c};font-size:1.05rem">${s.l}</div></div>`).join('')}
  </div>
  <div class="g2" style="margin-bottom:12px">
    ${[

// ── TAB: SCHEDULE ─────────────────────────────────────────────────────────
function tabSchedule(){
  const todayDay=new Date().getDate();
  const urgC=d=>d===0?'var(--red)':d<=3?'var(--orange)':d<=7?'var(--yellow)':'var(--green)';
  const urgT=d=>d===0?'วันนี้!':d===1?'พรุ่งนี้':`อีก ${d} วัน`;

  const upcoming=S.debts.filter(d=>d.due).map(d=>{
    const day=parseInt(d.due)||null;if(!day)return null;
    const diff=day>=todayDay?day-todayDay:day+31-todayDay;
    return{...d,dueDay:day,diff};
  }).filter(Boolean).sort((a,b)=>a.diff-b.diff);

  const daysMap={};
  S.debts.forEach(d=>{
    if(d.due)daysMap[parseInt(d.due)]=(daysMap[parseInt(d.due)]||[]).concat({name:d.name,type:'pay'});
    if(d.cutoff)daysMap[parseInt(d.cutoff)]=(daysMap[parseInt(d.cutoff)]||[]).concat({name:d.name,type:'cut'});
  });

  const allHistory=S.debts.flatMap(d=>(d.history||[]).map(h=>({...h,dname:d.name}))).sort((a,b)=>new Date(b.date)-new Date(a.date));

  return`
  <div class="stitle">วันชำระที่ใกล้ถึง</div>
  ${upcoming.map(d=>{const uc=urgC(d.diff);return`
    <div style="display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-left:3px solid ${uc};border-radius:10px;padding:12px 14px;margin-bottom:8px">
      <div class="mono" style="font-size:1.5rem;font-weight:700;color:${uc};min-width:32px;text-align:center;line-height:1">${d.dueDay}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:.88rem">${d.name}</div>
        <div style="font-size:.7rem;margin-top:2px"><span style="color:${uc};font-weight:600">${urgT(d.diff)}</span>${d.note?' · '+d.note:''}</div>
      </div>
      <div style="text-align:right">
        <div class="mono" style="color:var(--red);font-weight:600;font-size:.85rem">${fmtB(d.debt)}</div>
        ${d.rate>0?`<div class="mono" style="color:var(--orange);font-size:.65rem">ดอก ${fmtB(mInt(d.debt,d.rate))}</div>`:''}
      </div>
    </div>`}).join('')}

  <div class="stitle" style="margin-top:16px">ปฏิทินรายเดือน</div>
  <div class="card" style="margin-bottom:14px">
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:8px">
      ${['อา','จ','อ','พ','พฤ','ศ','ส'].map(d=>`<div style="text-align:center;font-size:.58rem;color:var(--muted);padding:4px">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">
      ${Array.from({length:35},(_,i)=>{
        const day=i+1<=31?i+1:0;
        const ev=day&&daysMap[day];
        const isT=day===todayDay;
        return day?`<div style="text-align:center;padding:4px 1px;border-radius:5px;background:${isT?'rgba(255,61,90,.15)':'transparent'};border:1px solid ${isT?'rgba(255,61,90,.4)':'transparent'}">
          <div style="font-size:.65rem;color:${isT?'var(--red)':'var(--sub)'}">${day}</div>
          ${ev?ev.slice(0,2).map(e=>`<div style="width:4px;height:4px;border-radius:50%;background:${e.type==='pay'?'var(--red)':'var(--blue)'};margin:1px auto"></div>`).join(''):''}

// ── TAB: STRATEGY ─────────────────────────────────────────────────────────
let _sBudget=30000;
function tabStrategy(){
  const active=S.debts.filter(d=>d.debt>0);
  const av=[...active].sort((a,b)=>(b.rate||0)-(a.rate||0)||b.debt-a.debt);
  const sb=[...active].sort((a,b)=>a.debt-b.debt||(b.rate||0)-(a.rate||0));
  const hu=[...active].sort((a,b)=>pct(b.debt,b.full)-pct(a.debt,a.full)).filter(d=>d.full>0);

  const sim=(order,budget)=>{
    let bals=order.map(d=>d.debt);const mins=order.map(d=>Math.max(200,Math.round(d.debt*(d.rate||0)/12+200)));
    let mo=0,tInt=0;
    while(bals.some(b=>b>0)&&mo<1200){mo++;let rem=budget;
      bals=bals.map((b,i)=>{if(b<=0)return 0;const int=b*(order[i].rate||0)/12;const pay=Math.min(rem,mins[i]);rem-=pay;tInt+=int;return Math.max(0,b+int-pay);});
      for(let i=0;i<bals.length;i++){if(bals[i]>0&&rem>0){const p=Math.min(rem,bals[i]);bals[i]-=p;rem-=p;}}
    }
    return{months:mo,totalInt:Math.round(tInt)};
  };

  const avR=sim(av,_sBudget),sbR=sim(sb,_sBudget),huR=sim(hu,_sBudget);

  return`
  <div class="card" style="margin-bottom:12px">
    <div class="stitle">งบชำระ/เดือน</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span class="mono" style="font-size:1.2rem;font-weight:700;color:var(--yellow)">${fmtB(_sBudget)}</span>
      <span style="font-size:.68rem;color:${totInt()>_sBudget?'var(--red)':'var(--green)'}">
        ${totInt()>_sBudget?`⚠️ ขั้นต่ำ ≈ ${fmtB(Math.round(totInt()))}`:''}</span>
    </div>
    <input type="range" min="5000" max="150000" step="1000" value="${_sBudget}" oninput="_sBudget=+this.value;render()">
  </div>

  ${[
    {title:'🏔️ Avalanche',sub:'ดอกสูงก่อน — ประหยัดสูงสุด',r:avR,order:av,c:'var(--red)',lv:d=>`${(d.rate*100).toFixed(2)}%`},
    {title:'⛄ Snowball',sub:'หนี้น้อยก่อน — momentum',r:sbR,order:sb,c:'var(--blue)',lv:d=>fmtB(d.debt)},
    {title:'📊 High Util',sub:'เกิน limit ก่อน — รักษาเครดิต',r:huR,order:hu,c:'var(--purple)',lv:d=>`${pct(d.debt,d.full)}%`},
  ].map(s=>`
    <div class="card" style="margin-bottom:10px;border-top:2px solid ${s.c}">
      <div style="font-weight:700;margin-bottom:2px">${s.title}</div>
      <div style="font-size:.72rem;color:var(--muted);margin-bottom:10px">${s.sub}</div>
      <div class="g2" style="gap:8px;margin-bottom:10px">
        <div style="background:var(--surface);border-radius:8px;padding:10px">
          <div style="font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px">จ่ายหมด</div>
          <div class="mono" style="color:${s.c};font-weight:700">${s.r.months} เดือน</div>
        </div>
        <div style="background:var(--surface);border-radius:8px;padding:10px">
          <div style="font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px">ดอกรวม</div>
          <div class="mono" style="color:var(--orange);font-weight:700">${fmtB(s.r.totalInt)}</div>
        </div>
      </div>
      ${s.order.slice(0,3).map((d,i)=>`
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div class="mono" style="width:14px;font-size:.72rem;color:${s.c};font-weight:700">${i+1}</div>
          <div style="flex:1;font-size:.78rem;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${d.name}</div>
          <div class="mono" style="font-size:.68rem;color:var(--muted)">${s.lv(d)}</div>
        </div>`).join('')}
    </div>`).join('')}`;
}

      <div class="ach-icon">${a.icon}</div>
      <div>
        <div style="font-size:.85rem;font-weight:600">${a.name} <span class="badge b-yel" style="font-size:.58rem">✓</span></div>
        <div style="font-size:.72rem;color:var(--muted)">${a.desc}</div>
      </div>
    </div>`).join('')||`<div style="color:var(--muted);font-size:.82rem;margin-bottom:12px">เริ่มชำระหนี้เพื่อปลดล็อก!</div>`}

  <div class="stitle" style="margin-top:12px">ยังไม่ปลดล็อก</div>
  ${locked.map(a=>`
    <div class="ach locked">
      <div class="ach-icon">${a.icon}</div>
      <div>
        <div style="font-size:.85rem;font-weight:600">${a.name}</div>
        <div style="font-size:.72rem;color:var(--muted)">${a.desc}</div>
      </div>
    </div>`).join('')}

  <div class="stitle" style="margin-top:14px">Streak ประจำวัน</div>
  <div class="card">
    <div class="streak-grid">
      ${Array.from({length:30},(_,i)=>{
        const f=i<(S.loginStreak||1);
        return`<div class="sdot" style="background:${f?'rgba(255,112,64,.2)':'var(--surface)'};border:1px solid ${f?'rgba(255,112,64,.4)':'var(--border)'};color:${f?'var(--orange)':'var(--muted)'}">${i+1}</div>`;
      }).join('')}
    </div>
    <div style="margin-top:10px;font-size:.68rem;color:var(--muted)">เป้า 7 วัน 🎯 | 30 วัน 🏆</div>
  </div>`;
}

// ── TAB: AI ───────────────────────────────────────────────────────────────
function tabAI(){
  const td=totDebt(),ti=totInt(),tf=totFull();
  const over=S.debts.filter(d=>d.full>0&&pct(d.debt,d.full)>100);
  const highRate=[...S.debts].filter(d=>d.rate>=0.3).sort((a,b)=>b.debt-a.debt);
  const mostDebt=[...S.debts].sort((a,b)=>b.debt-a.debt)[0];
  const cheapest=[...S.debts].filter(d=>d.rate>0).sort((a,b)=>a.rate-b.rate)[0];

  const insights=[
    {icon:'⚠️',lbl:'ความเสี่ยงสูง',c:'var(--red)',
     txt:over.length>0?`มี ${over.length} บัญชีเกิน limit: ${over.map(d=>d.name).join(', ')} — ควรชำระให้ต่ำกว่า 90% โดยเร็ว อาจมีค่าธรรมเนียม OD`
       :'ทุกบัญชีอยู่ในเกณฑ์ดี ไม่มีบัญชีเกิน Credit Limit ✓'},
    {icon:'💡',lbl:'Avalanche',c:'var(--blue)',
     txt:highRate.length>0?`ดอกสูงสุด: ${highRate[0].name} (${(highRate[0].rate*100).toFixed(2)}%/ปี) ยอด ${fmtB(highRate[0].debt)} ดอก/เดือน ≈ ${fmtB(mInt(highRate[0].debt,highRate[0].rate))} — โปะบัญชีนี้ก่อนประหยัดมากสุด`
       :'ไม่มีหนี้ที่มีดอกเบี้ยสูง'},
    {icon:'📊',lbl:'ภาระรวม',c:'var(--yellow)',
     txt:`หนี้รวม ${fmtB(td)} (${pct(td,tf)}% วงเงิน) ดอก/เดือนรวม ${fmtB(ti)} — จ่าย ${fmtB(Math.round(ti*1.5))}/เดือน จ่ายหมดใน ${moOff(td,ti*12/(td||1),Math.round(ti*1.5))} เดือน`},
    {icon:'🎯',lbl:'จุดโฟกัส',c:'var(--green)',
     txt:mostDebt?`ก้อนใหญ่สุด: ${mostDebt.name} (${fmtB(mostDebt.debt)}) = ${Math.round(mostDebt.debt/(td||1)*100)}% หนี้ทั้งหมด — ${mostDebt.rate>0.2?'ดอกสูง ลดก่อน':'ดอกต่ำ ใช้ Snowball กับบัญชีอื่นก่อนได้'}`:'ไม่มีข้อมูล'},
    {icon:'💰',lbl:'ประหยัดดอก',c:'var(--purple)',
     txt:cheapest?`ถ้า refinance หนี้ดอกสูงมาที่ ${(cheapest.rate*100).toFixed(2)}% จะประหยัดดอกได้ประมาณ ${fmtB(S.debts.filter(d=>d.rate>cheapest.rate).reduce((a,d)=>a+mInt(d.debt,d.rate-cheapest.rate),0))}/เดือน`:'ไม่มีข้อมูลดอกเบี้ย'},
  ];

  return`
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <div style="width:34px;height:34px;border-radius:50%;background:rgba(64,128,255,.15);border:1px solid rgba(64,128,255,.3);display:flex;align-items:center;justify-content:center;font-size:.9rem">🤖</div>
    <div>
      <div style="font-size:.9rem;font-weight:600">DebtOS AI Advisor</div>
      <div style="font-size:.65rem;color:var(--muted)">วิเคราะห์ real-time จากข้อมูลของคุณ</div>
    </div>
  </div>
  ${insights.map(ins=>`
    <div class="ai-msg" style="border-left:3px solid ${ins.c}">
      <div class="ai-label" style="color:${ins.c}">${ins.icon} ${ins.lbl}</div>
      ${ins.txt}
    </div>`).join('')}
  <div class="card" style="margin-top:12px">
    <div class="stitle">สรุปด่วน</div>
    ${[
      {q:'ควรจ่ายบัญชีไหนก่อน?',a:highRate.length>0?highRate[0].name+` (${(highRate[0].rate*100).toFixed(2)}%)` :'ไม่มีข้อมูล'},
      {q:'จ่ายหมดเมื่อไหร่?',a:dfDate(moOff(td,totInt()*12/(td||1),Math.round(totInt()*1.5)))+` (${fmtB(Math.round(totInt()*1.5))}/ด.)`},
      {q:'บัญชีอันตราย?',a:over.length>0?over.map(d=>d.name).join(', '):'ไม่มี ✓'},
      {q:'ประหยัดดอก/ปีถ้าโปะ10%?',a:fmtB(Math.round(totInt()*0.1*12))},
    ].map(x=>`
      <div style="background:var(--surface);border-radius:8px;padding:11px;margin-bottom:8px">
        <div style="font-size:.65rem;color:var(--blue);margin-bottom:4px">Q: ${x.q}</div>
        <div style="font-size:.8rem;color:#c0c0e0">${x.a}</div>
      </div>`).join('')}
  </div>`;
}

// ── MODALS ────────────────────────────────────────────────────────────────
function debtModal(id){
  const d=id?S.debts.find(x=>x.id===id):{id:S.nextId,name:'',rate:0,cutoff:'',due:'',full:0,debt:0,note:''};
  openSheet(`
    <div class="sheet-title">${id?'✏️ แก้ไขบัญชี':'💳 เพิ่มบัญชีหนี้'}</div>
    <div class="frow"><label class="flabel">ชื่อบัญชี</label><input type="text" id="fn" value="${d.name}" placeholder="เช่น KTC Proud"></div>
    <div class="fg2">
      <div class="frow"><label class="flabel">ดอกเบี้ย/ปี</label><input type="number" id="fr" value="${d.rate}" step=".001"></div>
      <div class="frow"><label class="flabel">วงเงิน (฿)</label><input type="number" id="ff" value="${d.full}"></div>
    </div>
    <div class="fg2">
      <div class="frow"><label class="flabel">หนี้คงเหลือ (฿)</label><input type="number" id="fd" value="${d.debt}"></div>
      <div class="frow"><label class="flabel">วันตัดบัญชี</label><input type="text" id="fc" value="${d.cutoff}" placeholder="20"></div>
    </div>
    <div class="frow"><label class="flabel">วันชำระ</label><input type="text" id="fdu" value="${d.due}" placeholder="5"></div>
    <div class="frow"><label class="flabel">หมายเหตุ</label><input type="text" id="fno" value="${d.note}"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-ghost" onclick="closeSheet()">ยกเลิก</button>
      <button class="btn btn-red" onclick="saveDebt(${d.id},${!!id})">บันทึก</button>
    </div>`);
}

function saveDebt(id,isEdit){
  const name=document.getElementById('fn').value.trim();
  if(!name){toast('กรุณาระบุชื่อบัญชี','var(--red)');return;}
  const obj={id,name,rate:parseFloat(document.getElementById('fr').value)||0,full:parseFloat(document.getElementById('ff').value)||0,
    debt:parseFloat(document.getElementById('fd').value)||0,cutoff:document.getElementById('fc').value.trim(),
    due:document.getElementById('fdu').value.trim(),note:document.getElementById('fno').value.trim(),
    history:isEdit?(S.debts.find(d=>d.id===id)?.history||[]):[]};
  if(isEdit){S.debts=S.debts.map(d=>d.id===id?obj:d);toast('✓ แก้ไขเรียบร้อย');}
  else{S.debts.push(obj);S.nextId++;toast('✓ เพิ่มบัญชีแล้ว');}
  save();closeSheet();render();
}

function delDebt(id){
  if(!confirm('ลบบัญชีนี้?'))return;
  S.debts=S.debts.filter(d=>d.id!==id);save();toast('ลบแล้ว','var(--orange)');render();
}

function payModal(id){
  const d=S.debts.find(x=>x.id===id);
  openSheet(`
    <div class="sheet-title">💰 บันทึกการชำระ</div>
    <div style="font-size:.82rem;color:var(--muted);margin-bottom:14px">${d.name} — คงเหลือ <span class="mono" style="color:var(--red)">${fmtB(d.debt)}</span></div>
    <div class="frow"><label class="flabel">จำนวนที่ชำระ (฿)</label><input type="number" id="pa" placeholder="5000" autofocus></div>
    <div class="frow"><label class="flabel">หมายเหตุ</label><input type="text" id="pn" placeholder="ขั้นต่ำ / โปะเพิ่ม..."></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-ghost" onclick="closeSheet()">ยกเลิก</button>
      <button class="btn btn-grn" onclick="savePay(${id})">บันทึก</button>
    </div>`);
}

function savePay(id){
  const amt=parseFloat(document.getElementById('pa').value);
  const note=document.getElementById('pn').value.trim();
  if(!amt||amt<=0){toast('กรุณาระบุจำนวน','var(--red)');return;}
  S.debts=S.debts.map(d=>d.id!==id?d:{...d,debt:Math.max(0,d.debt-amt),history:[...(d.history||[]),{date:new Date().toLocaleDateString('th-TH'),amount:amt,note}]});
  S.totalPaid=(S.totalPaid||0)+amt;
  save();closeSheet();toast(`✓ ชำระ ${fmtB(amt)}`);
  checkAch();render();
}

function assetModal(){
  openSheet(`
    <div class="sheet-title">💼 จัดการสินทรัพย์</div>
    ${S.assets.map(a=>`
      <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
        <input type="text" value="${a.name}" style="flex:1;font-size:.8rem" onchange="updAsset(${a.id},'name',this.value)">
        <input type="number" value="${a.value}" style="width:110px;font-size:.8rem" onchange="updAsset(${a.id},'value',+this.value)">
        <button class="btn btn-ghost" style="padding:6px 8px;color:var(--red)" onclick="delAsset(${a.id})">✕</button>
      </div>`).join('')}
    <button class="btn btn-ghost" style="width:100%;margin:6px 0 14px" onclick="addAsset()">+ เพิ่ม</button>
    <button class="btn btn-red" style="width:100%" onclick="closeSheet();render()">เสร็จ</button>`);
}

function updAsset(id,k,v){const a=S.assets.find(x=>x.id===id);if(a)a[k]=v;save();}
function delAsset(id){S.assets=S.assets.filter(a=>a.id!==id);save();assetModal();}
function addAsset(){S.assets.push({id:S.nextAid++,name:'สินทรัพย์ใหม่',value:0});save();assetModal();}

function checkAch(){
  ACHIEVEMENTS.forEach(a=>{if(!S.achievements?.[a.id]&&a.check()){
    if(!S.achievements)S.achievements={};
    S.achievements[a.id]=true;
    setTimeout(()=>toast(`🏆 ปลดล็อก: ${a.name}!`,'var(--yellow)'),400);
  }});save();
}

function exportCSV(){
  const h=['ชื่อ','ดอกเบี้ย%','ตัดบัญชี','ชำระ','วงเงิน','หนี้คงเหลือ','%'];
  const rows=S.debts.map(d=>[d.name,(d.rate*100).toFixed(2),d.cutoff,d.due,d.full,d.debt,pct(d.debt,d.full)]);
  const csv=[h,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));
  a.download='debtos.csv';a.click();
  toast('⬇ Export สำเร็จ');
}

function dSort(k){if(_sk===k)_sd=-_sd;else{_sk=k;_sd=-1;}render();}

// ── INIT ──────────────────────────────────────────────────────────────────
render();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js')
      .then(()=>console.log('SW registered'))
      .catch(e=>console.log('SW error',e));
  });
}
</script>
