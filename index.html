<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07070f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DebtOS">
<meta name="description" content="ระบบติดตามหนี้ส่วนตัว — DebtOS">
<title>DebtOS</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070f;--surface:#0b0b17;--card:#111120;--border:#1c1c2e;--dim:#2a2a42;
  --muted:#5a5a7a;--sub:#9090b0;--text:#ddddf0;
  --red:#ff3d5a;--green:#00e5a0;--yellow:#ffc840;--orange:#ff7040;--blue:#4080ff;--purple:#a060ff;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:'Noto Sans Thai','Syne',sans-serif;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
.mono{font-family:'JetBrains Mono',monospace}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
#loginScreen.hide{display:none}
.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2.4rem;letter-spacing:4px;color:var(--text);margin-bottom:6px}
.login-logo em{color:var(--red);font-style:normal}
.login-sub{font-size:.78rem;color:var(--muted);margin-bottom:40px;letter-spacing:.1em}
.login-box{width:100%;max-width:340px}
.pin-label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:16px}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:28px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--border);transition:all .2s}
.pin-dot.filled{background:var(--red);transform:scale(1.1)}
.pin-dot.error{background:var(--orange);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:280px;margin:0 auto}
.numkey{height:60px;background:var(--card);border:1px solid var(--border);border-radius:14px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:600;cursor:pointer;transition:all .12s}
.numkey:active{background:var(--dim);transform:scale(.93)}
.numkey.del{font-size:1rem;color:var(--muted)}
.numkey.empty{background:transparent;border-color:transparent;pointer-events:none}
.login-new{margin-top:24px;text-align:center;font-size:.75rem;color:var(--muted)}
.login-new button{background:none;border:none;color:var(--blue);font-family:'Noto Sans Thai',sans-serif;font-size:.75rem;cursor:pointer;text-decoration:underline;padding:4px}
.login-err{text-align:center;font-size:.78rem;color:var(--orange);margin-bottom:12px;min-height:20px}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.topbar{background:rgba(7,7,15,.96);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 10px) 16px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0;backdrop-filter:blur(16px);position:sticky;top:0;z-index:30}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;letter-spacing:3px;color:var(--text)}
.logo em{color:var(--red);font-style:normal}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--safe-bot) + 70px)}
.bottomnav{background:rgba(7,7,15,.97);border-top:1px solid var(--border);padding:8px 4px calc(var(--safe-bot) + 6px);display:flex;justify-content:space-around;flex-shrink:0;backdrop-filter:blur(16px)}
.navbtn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);cursor:pointer;padding:5px 10px;border-radius:10px;transition:all .15s;min-width:52px}
.navbtn .nb-icon{font-size:1.2rem;line-height:1}
.navbtn .nb-label{font-size:.6rem;font-family:'Noto Sans Thai',sans-serif;white-space:nowrap}
.navbtn.on{color:var(--red);background:rgba(255,61,90,.1)}
.navbtn:active{transform:scale(.92)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px;border-top:2px solid}
.scard-label{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.scard-val{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:700}
.stitle{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:400px){.g3{grid-template-columns:1fr 1fr}}

/* BLUR */
.blurred{filter:blur(8px);user-select:none;pointer-events:none;transition:filter .3s}
.hide-toggle{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;padding:5px 10px;font-size:.72rem;font-family:'Noto Sans Thai',sans-serif;display:flex;align-items:center;gap:5px;transition:all .15s}
.hide-toggle:active{transform:scale(.95)}

/* PROGRESS */
.pbar-wrap{display:flex;align-items:center;gap:6px}
.pbar{flex:1;height:5px;background:var(--bg);border-radius:99px;overflow:hidden}
.pbar-fill{height:100%;border-radius:99px;transition:width .5s}
.hero-amt{font-family:'JetBrains Mono',monospace;font-size:clamp(2rem,8vw,3.2rem);font-weight:700;color:var(--red);line-height:1}

/* BADGE */
.badge{display:inline-block;font-size:.65rem;padding:2px 7px;border-radius:4px}
.b-red{background:rgba(255,61,90,.15);color:var(--red);border:1px solid rgba(255,61,90,.3)}
.b-grn{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.25)}
.b-yel{background:rgba(255,200,64,.1);color:var(--yellow);border:1px solid rgba(255,200,64,.25)}
.b-pur{background:rgba(160,96,255,.1);color:var(--purple);border:1px solid rgba(160,96,255,.25)}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--red);position:absolute;top:2px;right:2px}

/* BUTTONS */
.btn{font-family:'Noto Sans Thai',sans-serif;font-size:.78rem;padding:7px 15px;border-radius:8px;cursor:pointer;border:1px solid var(--border);transition:all .15s}
.btn:active{transform:scale(.96)}
.btn-red{background:var(--red);color:#fff;border-color:var(--red)}
.btn-ghost{background:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--surface);color:var(--text)}
.btn-grn{background:rgba(0,229,160,.12);color:var(--green);border-color:var(--green)}
.btn-blue{background:transparent;color:var(--blue);border-color:var(--blue)}
input[type=text],input[type=number],input[type=password],select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Noto Sans Thai',sans-serif;font-size:.85rem;padding:9px 12px;border-radius:8px;outline:none;width:100%}
input:focus,select:focus{border-color:var(--red)}
input[type=range]{width:100%;accent-color:var(--red)}

/* TABLE */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tbl-wrap table{width:100%;border-collapse:collapse;min-width:540px}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
th{padding:9px 12px;text-align:left;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);background:var(--surface);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
td{padding:11px 12px;font-size:.82rem;border-bottom:1px solid rgba(28,28,46,.5);vertical-align:middle}
tr:last-child td{border-bottom:none}
tfoot td{background:var(--surface);border-top:1px solid var(--border);font-weight:700;font-family:'JetBrains Mono',monospace}

/* SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.overlay.on{display:flex}
.sheet{background:var(--card);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 20px calc(var(--safe-bot)+20px);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;animation:slideUp .28s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.sheet-handle{width:36px;height:4px;background:var(--dim);border-radius:99px;margin:0 auto 18px}
.sheet-title{font-weight:700;font-size:.95rem;margin-bottom:6px}
.sheet-sub{font-size:.78rem;color:var(--muted);margin-bottom:18px}
.frow{margin-bottom:13px}
.flabel{display:block;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-bot)+80px);left:50%;transform:translateX(-50%) translateY(20px);z-index:400;background:var(--card);border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:99px;font-size:.82rem;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}

/* NOTIF */
.notif-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden}
.notif-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid rgba(28,28,46,.4)}
.notif-item:last-child{border-bottom:none}
.notif-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.notif-urgent{background:rgba(255,61,90,.15)}
.notif-warn{background:rgba(255,112,64,.15)}
.notif-ok{background:rgba(0,229,160,.1)}

/* CYCLE TAG */
.cycle-tag{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;padding:2px 8px;border-radius:4px;background:rgba(64,128,255,.1);color:var(--blue);border:1px solid rgba(64,128,255,.25)}

/* SCHEDULE PAY CARD */
.due-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:all .2s}
.due-card-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.due-card-header:active{background:rgba(255,255,255,.03)}
.due-day{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:700;min-width:40px;text-align:center;line-height:1}
.due-info{flex:1}
.due-name{font-weight:600;font-size:.92rem;margin-bottom:2px}
.due-meta{font-size:.7rem;color:var(--muted)}
.due-right{text-align:right;flex-shrink:0}
.due-amount{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.9rem}
.due-interest{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--orange);margin-top:2px}
.due-chevron{font-size:.8rem;color:var(--muted);margin-left:8px;transition:transform .2s}
.due-chevron.open{transform:rotate(180deg)}

/* INLINE PAY PANEL */
.pay-panel{display:none;border-top:1px solid var(--border);padding:14px 16px;background:rgba(0,0,0,.2)}
.pay-panel.open{display:block}
.quick-amounts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.qa-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--sub);font-size:.75rem;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .15s}
.qa-btn:active{background:var(--dim)}
.qa-btn.selected{border-color:var(--green);color:var(--green);background:rgba(0,229,160,.08)}
.pay-input-row{display:flex;gap:8px;align-items:center}
.pay-input-row input{flex:1;font-family:'JetBrains Mono',monospace}

/* ACHIEVEMENT */
.ach{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.ach.unlocked{border-color:var(--yellow)}
.ach.locked{opacity:.35}
.ach-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;background:var(--surface)}
.ach.unlocked .ach-icon{background:rgba(255,200,64,.15)}
.nw-bar{display:flex;height:26px;border-radius:8px;overflow:hidden;margin-bottom:8px}
.nw-seg{display:flex;align-items:center;justify-content:center;font-size:.6rem;font-family:'JetBrains Mono',monospace;transition:flex .5s}
.streak-grid{display:flex;gap:3px;flex-wrap:wrap}
.sdot{width:26px;height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-logo">DEBT<em>OS</em></div>
  <div class="login-sub">ระบบติดตามหนี้ส่วนตัว</div>
  <div id="installBanner" style="display:none;width:100%;max-width:340px;background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);border-radius:12px;padding:14px 16px;margin-bottom:24px;text-align:center">
    <div style="font-size:1.6rem;margin-bottom:6px">📲</div>
    <div style="font-size:.85rem;font-weight:600;color:var(--green);margin-bottom:4px">ติดตั้ง DebtOS เป็นแอพ!</div>
    <div style="font-size:.72rem;color:var(--muted);margin-bottom:12px">ใช้งานได้แบบ offline ไม่มีโฆษณา</div>
    <button onclick="doInstall()" style="background:var(--green);color:#003828;border:none;border-radius:9px;padding:10px 28px;font-size:.88rem;font-family:'Noto Sans Thai',sans-serif;font-weight:700;cursor:pointer;width:100%">ติดตั้งเลย</button>
    <button onclick="document.getElementById('installBanner').style.display='none'" style="background:none;border:none;color:var(--muted);font-size:.72rem;margin-top:8px;cursor:pointer;font-family:'Noto Sans Thai',sans-serif">ไม่ใช่ตอนนี้</button>
  </div>
  <div class="login-box">
    <div class="pin-label" id="pinLabel">ใส่ PIN 4 หลัก</div>
    <div class="login-err" id="pinErr"></div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="numpad" id="numpad"></div>
    <div class="login-new" id="loginNew"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="logo">DEBT<em>OS</em></div>
    <div style="flex:1"></div>
    <button class="hide-toggle" onclick="toggleHide()">
      <span id="hideIcon">👁</span><span id="hideText">ซ่อน</span>
    </button>
    <div style="position:relative;margin-left:6px">
      <button class="btn btn-ghost" style="padding:5px 10px;font-size:.82rem" onclick="goTab('schedule')">🔔</button>
      <div class="notif-dot" id="notifDot" style="display:none"></div>
    </div>
    <button id="installBtn" style="display:none;background:var(--green);color:#003828;border:none;border-radius:8px;padding:5px 11px;font-size:.72rem;font-family:'Noto Sans Thai',sans-serif;cursor:pointer;font-weight:600;margin-left:2px" onclick="doInstall()">📲 ติดตั้ง</button>
    <button class="btn btn-ghost" style="padding:5px 8px;font-size:.72rem;margin-left:2px;color:var(--muted)" onclick="doLock()">🔒</button>
  </div>
  <div class="main" id="main"><div id="content"></div></div>
  <nav class="bottomnav" id="bottomnav"></nav>
</div>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────
const SK = 'debtos_v5';
const PALETTE = ['#ff3d5a','#00e5a0','#ffc840','#ff7040','#4080ff','#a060ff','#ff80b0','#40d0ff'];
const TABS = [
  {id:'overview', icon:'📊', label:'ภาพรวม'},
  {id:'debts',    icon:'💳', label:'หนี้'},
  {id:'schedule', icon:'📅', label:'นัดชำระ'},
  {id:'calc',     icon:'📈', label:'คำนวณ'},
  {id:'achieve',  icon:'🎖',  label:'รางวัล'},
];

const INIT_DEBTS = [
  {id:1,name:'Finnix',rate:0.33,cutoff:'',due:'20',full:15768,debt:13600,note:'',history:[]},
  {id:2,name:'Rabbit Cash',rate:0.33,cutoff:'30',due:'15',full:25300,debt:25500,note:'ยอดขั้น 1st',history:[]},
  {id:3,name:'Promise',rate:0.25,cutoff:'',due:'31',full:10000,debt:9700,note:'',history:[]},
  {id:4,name:'KTC Proud',rate:0.25,cutoff:'20',due:'5',full:34500,debt:35222,note:'',history:[]},
  {id:5,name:'Umay',rate:0.198,cutoff:'',due:'2',full:72000,debt:72848,note:'',history:[]},
  {id:6,name:'UOB Credit',rate:0.16,cutoff:'20',due:'13',full:96000,debt:83068,note:'',history:[]},
  {id:7,name:'Samsung Finance',rate:0,cutoff:'',due:'1',full:16228,debt:4056,note:'',history:[]},
  {id:8,name:'Shopee',rate:0,cutoff:'',due:'',full:0,debt:1030,note:'',history:[]},
  {id:9,name:'Thunder',rate:0.33,cutoff:'',due:'',full:40000,debt:38500,note:'',history:[]},
];
const INIT_ASSETS = [
  {id:1,name:'เงินสด/ออมทรัพย์',value:15000},
  {id:2,name:'รถยนต์',value:150000},
];

// ─── STATE ─────────────────────────────────────────────────────
function loadState(){
  try{const s=localStorage.getItem(SK);if(s)return JSON.parse(s);}catch(e){}
  return{
    debts:JSON.parse(JSON.stringify(INIT_DEBTS)),
    assets:JSON.parse(JSON.stringify(INIT_ASSETS)),
    nextId:10,nextAid:3,tab:'overview',
    loginStreak:1,lastLogin:null,totalPaid:0,achievements:{},
    pin:null,hidden:false,notifEnabled:false
  };
}
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}
let S = loadState();
let _hidden = S.hidden||false;

// streak
const _today = new Date().toDateString();
if(S.lastLogin !== _today){
  S.loginStreak = S.lastLogin===new Date(Date.now()-86400000).toDateString() ? (S.loginStreak||0)+1 : 1;
  S.lastLogin = _today; save();
}

// ─── HELPERS ───────────────────────────────────────────────────
const fmt   = n => (n||0).toLocaleString('th-TH');
const fmtB  = n => '฿'+fmt(Math.round(n));
const H     = v => _hidden ? '•••••' : v;
const pct   = (d,f) => f>0 ? Math.round(d/f*100) : 0;
const mInt  = (d,r) => Math.round(d*r/12);
const moOff = (d,r,m) => {
  if(m<=0) return 999; const ri=r/12;
  if(ri===0) return Math.ceil(d/m);
  if(m<=d*ri) return 999;
  return Math.ceil(Math.log(m/(m-d*ri))/Math.log(1+ri));
};
const totDebt  = () => S.debts.reduce((a,d)=>a+d.debt,0);
const totFull  = () => S.debts.reduce((a,d)=>a+d.full,0);
const totInt   = () => S.debts.reduce((a,d)=>a+mInt(d.debt,d.rate),0);
const netWorth = () => S.assets.reduce((a,x)=>a+x.value,0)-totDebt();
const dfDate   = mo => {
  if(mo>=999) return '–';
  const d=new Date(); d.setMonth(d.getMonth()+mo);
  return d.toLocaleDateString('th-TH',{month:'short',year:'numeric'});
};
const getUrgent = () => {
  const now = new Date().getDate();
  return S.debts.filter(d=>d.due).map(d=>{
    const day=parseInt(d.due)||null; if(!day) return null;
    const diff=day>=now?day-now:day+31-now;
    return{...d,dueDay:day,diff};
  }).filter(d=>d&&d.diff<=3).sort((a,b)=>a.diff-b.diff);
};

// ─── PIN / LOGIN ───────────────────────────────────────────────
let _pin='', _pinMode='login', _pinNew='';

// build numpad HTML
document.getElementById('numpad').innerHTML =
  [1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>
    k===''  ? `<button class="numkey empty"></button>` :
    k==='⌫' ? `<button class="numkey del" onclick="pinDel()">⌫</button>` :
               `<button class="numkey" onclick="pinKey('${k}')">${k}</button>`
  ).join('');

function initLogin(){
  if(!S.pin){
    _pinMode='set';
    document.getElementById('pinLabel').textContent='ตั้ง PIN 4 หลัก';
    document.getElementById('loginNew').innerHTML='';
  } else {
    _pinMode='login';
    document.getElementById('pinLabel').textContent='ใส่ PIN';
    document.getElementById('loginNew').innerHTML=`<button onclick="forgotPin()">ลืม PIN?</button>`;
  }
  _pin=''; updateDots();
}
function pinKey(k){ if(_pin.length>=4)return; _pin+=k; updateDots(); if(_pin.length===4)setTimeout(checkPin,120); }
function pinDel(){ _pin=_pin.slice(0,-1); updateDots(); document.getElementById('pinErr').textContent=''; }
function updateDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('d'+i);
    d.classList.toggle('filled',i<_pin.length);
    d.classList.remove('error');
  }
}
function checkPin(){
  if(_pinMode==='login'){
    _pin===S.pin ? loginSuccess() : pinError('PIN ไม่ถูกต้อง');
  } else if(_pinMode==='set'){
    _pinNew=_pin; _pin=''; _pinMode='confirm';
    document.getElementById('pinLabel').textContent='ยืนยัน PIN อีกครั้ง';
    updateDots(); document.getElementById('pinErr').textContent='';
  } else {
    if(_pin===_pinNew){ S.pin=_pin; save(); toast('✓ ตั้ง PIN เรียบร้อย'); loginSuccess(); }
    else { pinError('PIN ไม่ตรงกัน'); _pinMode='set'; _pinNew=''; document.getElementById('pinLabel').textContent='ตั้ง PIN 4 หลัก'; }
  }
}
function pinError(msg){
  document.getElementById('pinErr').textContent=msg;
  for(let i=0;i<4;i++) document.getElementById('d'+i).classList.add('error');
  setTimeout(()=>{_pin='';updateDots();},400);
}
function loginSuccess(){
  document.getElementById('loginScreen').classList.add('hide');
  document.getElementById('app').style.display='flex';
  scheduleNotifCheck(); render();
}
function doLock(){
  document.getElementById('loginScreen').classList.remove('hide');
  document.getElementById('app').style.display='none';
  initLogin();
}
function forgotPin(){
  if(confirm('รีเซ็ต PIN? ข้อมูลจะไม่หาย')){
    S.pin=null; save(); _pinMode='set'; _pinNew=''; _pin='';
    document.getElementById('pinLabel').textContent='ตั้ง PIN ใหม่';
    document.getElementById('loginNew').innerHTML=''; updateDots();
  }
}

// ─── NOTIFICATIONS ─────────────────────────────────────────────
function updateNotifDot(){ document.getElementById('notifDot').style.display=getUrgent().length?'block':'none'; }
async function requestNotifPermission(){
  if(!('Notification' in window)){toast('เบราว์เซอร์ไม่รองรับ','var(--orange)');return;}
  const p=await Notification.requestPermission();
  if(p==='granted'){
    S.notifEnabled=true; save(); toast('✓ เปิดการแจ้งเตือนแล้ว');
    scheduleNotifCheck();
    new Notification('DebtOS 🔔',{body:'จะแจ้งเตือนวันชำระล่วงหน้า 3 วัน',icon:'icon-192.png'});
  } else toast('ไม่ได้รับอนุญาต','var(--orange)');
}
function scheduleNotifCheck(){ if(!S.notifEnabled)return; sendDueNotifs(); setInterval(sendDueNotifs,3600000); }
function sendDueNotifs(){
  if(Notification.permission!=='granted') return;
  getUrgent().forEach(d=>{
    const key=`notif_${d.id}_${d.dueDay}_${new Date().toDateString()}`;
    if(localStorage.getItem(key)) return;
    localStorage.setItem(key,'1');
    const msg=d.diff===0?`วันนี้! ชำระ ${d.name} ${fmtB(d.debt)}`:d.diff===1?`พรุ่งนี้ — ${d.name}`:`อีก ${d.diff} วัน — ${d.name}`;
    new Notification('DebtOS นัดชำระ 🔔',{body:msg,icon:'icon-192.png'});
  });
}

function togglePayPanel(id){
  _openCard = _openCard===id ? null : id;
  // re-render schedule tab without full page scroll reset
  const fns={overview:tabOverview,debts:tabDebts,schedule:tabSchedule,calc:tabCalc,achieve:tabAchieve};
  const scrollY=document.getElementById('main').scrollTop;
  document.getElementById('content').innerHTML=tabSchedule();
  document.getElementById('main').scrollTop=scrollY;
  // auto-focus input if opening
  if(_openCard===id){
    setTimeout(()=>{
      const inp=document.getElementById(`pinput_${id}`);
      if(inp) inp.focus();
    },200);
  }
}

function selectQA(id,v){
  document.getElementById(`pinput_${id}`).value=v;
  document.querySelectorAll(`#qa_${id} .qa-btn`).forEach(b=>b.classList.remove('selected'));
  event.target.classList.add('selected');
}
function clearQASelect(id){
  document.querySelectorAll(`#qa_${id} .qa-btn`).forEach(b=>b.classList.remove('selected'));
}

function quickPay(id){
  const inp=document.getElementById(`pinput_${id}`);
  const amt=parseFloat(inp.value);
  if(!amt||amt<=0){inp.focus();inp.style.borderColor='var(--red)';setTimeout(()=>inp.style.borderColor='',800);return;}
  S.debts=S.debts.map(d=>d.id!==id?d:{
    ...d,
    debt:Math.max(0,d.debt-amt),
    history:[...(d.history||[]),{date:new Date().toLocaleDateString('th-TH'),amount:amt,note:''}]
  });
  S.totalPaid=(S.totalPaid||0)+amt;
  _openCard=null;
  save(); toast(`✓ ชำระ ${fmtB(amt)} — ${S.debts.find(d=>d.id===id)?.name}`);
  checkAch(); render();
}

let _cSel=null,_cMo=20000;
function tabCalc(){
  const d=_cSel!=null?S.debts.find(x=>x.id===_cSel):null;
  const cd=d?d.debt:totDebt(), cr=d?d.rate:(totDebt()>0?totInt()*12/totDebt():0);
  const mos=moOff(cd,cr,_cMo), tp=mos<999?_cMo*mos:0, ti2=mos<999?tp-cd:0, mi=mInt(cd,cr);
  const rows=[];
  if(mos<999){
    let rem=cd;
    for(let m=1;m<=Math.min(mos,24);m++){
      const int=rem*cr/12, prin=Math.min(_cMo-int,rem);
      rem=Math.max(0,rem-prin);
      rows.push({m,int:Math.round(int),prin:Math.round(prin),rem:Math.round(rem)});
    }
  }
  return `
  <div class="card" style="margin-bottom:12px">
    <div class="stitle">ตั้งค่า</div>
    <div class="frow"><label class="flabel">เลือกบัญชี</label>
      <select onchange="_cSel=this.value?parseInt(this.value):null;render()" style="font-size:.82rem">
        <option value="">ภาพรวมทั้งหมด</option>
        ${S.debts.map(d=>`<option value="${d.id}"${_cSel===d.id?' selected':''}>${d.name}</option>`).join('')}
      </select>
    </div>
    <div class="frow"><label class="flabel">จ่ายต่อเดือน: <span class="mono" style="color:var(--yellow)">${fmtB(_cMo)}</span></label>
      <input type="range" min="500" max="100000" step="500" value="${_cMo}" oninput="_cMo=+this.value;render()">
    </div>
    <div style="font-size:.72rem;color:${mi>_cMo?'var(--red)':'var(--green)'};margin-top:2px">
      ${mi>_cMo?`⚠️ ดอกเบี้ย ≈ ${fmtB(mi)} — จ่ายน้อยกว่าดอก!`:`✓ ชำระเงินต้น ≈ ${fmtB(_cMo-mi)}/เดือน`}
    </div>
  </div>
  <div class="g2" style="margin-bottom:12px">
    ${[
      {l:fmtB(cd),sl:'หนี้คงเหลือ',c:'var(--red)'},
      {l:fmtB(mi),sl:'ดอกเบี้ย/เดือน',c:'var(--orange)'},
      {l:mos>=999?'ไม่พอจ่าย':mos+' เดือน',sl:'เวลาจ่ายหมด',c:mos>=999?'var(--red)':'var(--green)'},
      {l:mos>=999?'–':fmtB(tp),sl:'จ่ายทั้งหมด',c:'var(--text)'},
      {l:mos>=999?'–':fmtB(ti2),sl:'ดอกเบี้ยรวม',c:'var(--orange)'},
      {l:dfDate(mos),sl:'วันจ่ายหมด',c:'var(--purple)'},
    ].map(s=>`<div class="scard" style="border-top-color:${s.c}"><div class="scard-label">${s.sl}</div><div class="scard-val" style="color:${s.c};font-size:.95rem">${s.l}</div></div>`).join('')}
  </div>
  <div class="stitle">ตารางผ่อน (24 เดือน)</div>
  <div class="tbl-wrap" style="max-height:340px;overflow-y:auto">
    <div class="tbl-scroll"><table>
      <thead><tr><th>เดือน</th><th style="text-align:right">ดอกเบี้ย</th><th style="text-align:right">เงินต้น</th><th style="text-align:right">คงเหลือ</th></tr></thead>
      <tbody>
        ${rows.map(r=>`<tr>
          <td class="mono" style="color:var(--muted)">${r.m}</td>
          <td class="mono" style="text-align:right;color:var(--orange)">${fmtB(r.int)}</td>
          <td class="mono" style="text-align:right;color:var(--green)">${fmtB(r.prin)}</td>
          <td class="mono" style="text-align:right;color:${r.rem<cd*0.5?'var(--green)':'var(--text)'}">${fmtB(r.rem)}</td>
        </tr>`).join('')||`<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:20px">${mos>=999?'ยอดจ่ายน้อยกว่าดอกเบี้ย':'ตั้งยอดชำระ'}</td></tr>`}
      </tbody>
    </table></div>
  </div>`;
}

function saveDebt(id,isEdit){
  const name=document.getElementById('fn').value.trim();

  const obj={id,name,
    rate:parseFloat(document.getElementById('fr').value)||0,
    full:parseFloat(document.getElementById('ff').value)||0,
    debt:parseFloat(document.getElementById('fd').value)||0,
    cutoff:document.getElementById('fc').value.trim(),
    due:document.getElementById('fdu').value.trim(),
    note:document.getElementById('fno').value.trim(),
    history:isEdit?(S.debts.find(d=>d.id===id)?.history||[]):[]
  };
  if(isEdit){S.debts=S.debts.map(d=>d.id===id?obj:d);toast('✓ แก้ไขเรียบร้อย');}

}

        <input type="number" value="${a.value}" style="width:110px;font-size:.8rem" onchange="updAsset(${a.id},'value',+this.value)">
        <button class="btn btn-ghost" style="padding:6px 8px;color:var(--red)" onclick="delAsset(${a.id})">✕</button>
      </div>`).join('')}
    <button class="btn btn-ghost" style="width:100%;margin:6px 0 14px" onclick="addAsset()">+ เพิ่ม</button>
    <button class="btn btn-red" style="width:100%" onclick="closeSheet();render()">เสร็จ</button>`);
}
function updAsset(id,k,v){const a=S.assets.find(x=>x.id===id);if(a)a[k]=v;save();}
function delAsset(id){S.assets=S.assets.filter(a=>a.id!==id);save();assetModal();}
function addAsset(){S.assets.push({id:S.nextAid++,name:'สินทรัพย์ใหม่',value:0});save();assetModal();}

function exportCSV(){
  const h=['ชื่อ','ดอกเบี้ย%','ตัดบัญชี','ชำระ','วงเงิน','หนี้คงเหลือ','%'];
  const rows=S.debts.map(d=>[d.name,(d.rate*100).toFixed(2),d.cutoff,d.due,d.full,d.debt,pct(d.debt,d.full)]);
  const csv=[h,...rows].map(r=>r.join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));
  a.download='debtos.csv'; a.click();
  toast('⬇ Export สำเร็จ');
}

function dSort(k){if(_sk===k)_sd=-_sd;else{_sk=k;_sd=-1;}render();}

// ─── PWA INSTALL ───────────────────────────────────────────────
let _deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  // แสดงปุ่มบน topbar
  const btn = document.getElementById('installBtn');
  if(btn) btn.style.display = 'block';
  // แสดง banner หน้า login
  const banner = document.getElementById('installBanner');
  if(banner) banner.style.display = 'block';
});

window.addEventListener('appinstalled', () => {
  _deferredPrompt = null;
  const btn = document.getElementById('installBtn');
  if(btn) btn.style.display = 'none';
  const banner = document.getElementById('installBanner');
  if(banner) banner.style.display = 'none';
  toast('🎉 ติดตั้ง DebtOS สำเร็จ! เช็ค Home Screen ได้เลย');
});

async function doInstall(){
  if(!_deferredPrompt){ toast('เปิดใน​Chrome แล้วลองใหม่นะครับ','var(--orange)'); return; }
  _deferredPrompt.prompt();
  const {outcome} = await _deferredPrompt.userChoice;
  if(outcome === 'accepted'){
    toast('✓ กำลังติดตั้ง...');
  }
  _deferredPrompt = null;
  const btn = document.getElementById('installBtn');
  if(btn) btn.style.display = 'none';
  const banner = document.getElementById('installBanner');
  if(banner) banner.style.display = 'none';
}

initLogin();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW:',e));
  });
}
